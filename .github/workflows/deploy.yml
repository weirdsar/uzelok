# Required GitHub Secrets:
# BEGET_FTP_HOST — ftp.beget.com (or your panel host)
# BEGET_FTP_USER — FTP login on Beget
# BEGET_FTP_PASSWORD — FTP password
#
# Settings → Secrets and variables → Actions → New repository secret
#
# Отдельный FTP Beget (логин вида *_site, корень = уже папка домена):
# Settings → Secrets and variables → Actions → Variables → BEGET_FTP_SERVER_DIR = ./
# Иначе с server-dir uzelok64.ru/ файлы попадут в uzelok64.ru/uzelok64.ru/, сайт останется старым.
# Основной FTP (корень аккаунта): переменную не задавать — будет uzelok64.ru/

name: Deploy to Beget

on:
  push:
    branches: [main]
  workflow_dispatch: # Ручной запуск: Actions → Deploy to Beget → Run workflow

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, curl, mbstring, json
          tools: php-cs-fixer

      - name: PHP syntax check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Check coding standards (dry-run)
        run: |
          php-cs-fixer fix --dry-run --diff --rules=@PSR12 core/ public_html/ || true
        continue-on-error: true

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, curl, mbstring, json

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Require Beget FTP secrets
        env:
          BEGET_FTP_HOST: ${{ secrets.BEGET_FTP_HOST }}
          BEGET_FTP_USER: ${{ secrets.BEGET_FTP_USER }}
          BEGET_FTP_PASSWORD: ${{ secrets.BEGET_FTP_PASSWORD }}
        run: |
          if [ -z "$BEGET_FTP_HOST" ] || [ -z "$BEGET_FTP_USER" ] || [ -z "$BEGET_FTP_PASSWORD" ]; then
            echo "::error::Нет секретов FTP. Репозиторий → Settings → Secrets and variables → Actions → New repository secret. Нужны: BEGET_FTP_HOST (часто ftp.beget.com), BEGET_FTP_USER, BEGET_FTP_PASSWORD — как в панели Beget (FTP)."
            exit 1
          fi

      - name: FTP server-dir (проверка пути)
        env:
          RESOLVED_SERVER_DIR: ${{ vars.BEGET_FTP_SERVER_DIR != '' && vars.BEGET_FTP_SERVER_DIR || 'uzelok64.ru/' }}
        run: |
          echo "Переменная BEGET_FTP_SERVER_DIR (repo Variables): '${{ vars.BEGET_FTP_SERVER_DIR }}'"
          echo "Итоговый server-dir для деплоя: $RESOLVED_SERVER_DIR"
          if [ "$RESOLVED_SERVER_DIR" = "uzelok64.ru/" ]; then
            echo "::notice::Если у вас отдельный FTP Beget (корень = папка сайта), добавьте Variables → BEGET_FTP_SERVER_DIR = ./ иначе файлы уйдут в uzelok64.ru/uzelok64.ru/ и на сайте будет старая версия."
          fi

      - name: Deploy via sFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BEGET_FTP_HOST }}
          username: ${{ secrets.BEGET_FTP_USER }}
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          # Trailing slash required by the action. Sub-FTP chroot → set repo var BEGET_FTP_SERVER_DIR=./
          server-dir: ${{ vars.BEGET_FTP_SERVER_DIR != '' && vars.BEGET_FTP_SERVER_DIR || 'uzelok64.ru/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            docker-compose.yml
            Dockerfile
            .env
            .ozon.env
            .beget.env
            database/*.db
            logs/*.log
            memory.md
            README.md
            .cursorrules
